<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotrole de caixa</title>

    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <h1>CONTROLE DE CAIXA</h1>

    <main>
        <div class="controls">
            <div class="movements">
                <h2>Movimentações</h2>

                <form>
                    <div class="nameDate">
                        <div class="name">
                            <label for="">Nome</label>
                            <input type="text" placeholder="Digite o valor">
                        </div>

                        <div class="date">
                            <label for="">Data</label>
                            <input type="date" placeholder="Selecione a data">
                        </div>
                    </div>

                    <div class="observation">
                        <label for="">Observação(opcional)</label>
                        <input type="text">
                    </div>

                    <div class="type">
                        <label for="">Tipo de movimentação</label>
                        <input class="revenue" type="checkbox"><span>Receita</span>
                        <input class="expense" type="checkbox"><span>Despesa</span>
                        <button class="btn-add">Adiconar</button>
                    </div>
                </form>
            </div>
            <div>
                <div class="title">
                    <h2>Receitas e Despesas</h2>
                    <span>Despesas</span>
                    <span>Receitas</span>
                </div>
            </div>
        </div>

        <div>

        </div>
    </main>

    <script src="src/js/index.js"></script>
</body>

</html>
