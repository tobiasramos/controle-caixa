<!DOCTYPE html>
<html lang="en">

    <title>Cotrole de caixa</title>

<body>
    <div class="title">

    <main>

                <form>
                    <label for="">Nome</label>

                    <label for="">Data</label>

                    <label for="">Observação(opcional)</label>

                    <label for="">Tipo de movimentação</label>

            </div>
            <div>
                <div class="title">
                    <h2>Receitas e Despesas</h2>
                    <span>Despesas</span>
                    <span>Receitas</span>

            </div>
        </div>

        <div>

        </div>
